<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nguyễn Sơn Bakery Chatbot</title>
    <meta
      name="description"
      content="Chatbot tư vấn sản phẩm, giá, chính sách và hình ảnh bánh Nguyễn Sơn Bakery."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=19" />
  </head>
  <body>
    <div class="app-shell">
      <main class="chat-panel" id="chat-card">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Trợ lý tư vấn</p>
            <h1 id="brand-name">Nguyễn Sơn Bakery</h1>
            <p class="lead">Hỏi nhanh về sản phẩm, giá, giao hàng hoặc xem hình ảnh bánh.</p>
          </div>
          <div class="header-actions">
            <span id="status-badge" class="status-badge status-badge--offline">Đang kết nối</span>
            <span id="status-detail" class="status-detail"></span>
            <button type="button" class="ghost-button" id="clear-chat">Cuộc trò chuyện mới</button>
          </div>
        </header>

        <section class="prompt-section" aria-label="Gợi ý câu hỏi">
          <div class="section-head">
            <h3>Câu hỏi gợi ý</h3>
          </div>
          <div class="prompt-list" id="prompt-list"></div>
        </section>

        <section class="chat-messages" id="chat-messages" aria-live="polite"></section>

        <form id="chat-form" class="chat-form">
          <label class="sr-only" for="chat-input">Nhập câu hỏi</label>
          <div class="composer">
            <textarea
              id="chat-input"
              rows="1"
              enterkeyhint="send"
              placeholder="Hỏi về sản phẩm, mức giá, chính sách giao hàng hoặc yêu cầu xem ảnh..."
            ></textarea>
            <div class="composer-actions">
              <button id="chat-submit" type="submit" class="send-button">Gửi</button>
            </div>
          </div>
        </form>
      </main>
    </div>

    <script src="./app.js?v=19"></script>
  </body>
</html>
